site_name: tax-flow
site_description: Adaptive ODE integration and Automatic Domain Splitting built on tax
site_url: https://andreapasquale94.github.io/tax-flow/
repo_url: https://github.com/andreapasquale94/tax-flow
repo_name: andreapasquale94/tax-flow
edit_uri: edit/main/docs/

# Hide internal dev notes from the published site.
exclude_docs: |
  benchmarks/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andreapasquale94/tax-flow
  generator: false

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Two-Body Problem: tutorials/two_body.md
      - Parallel ADS by Refinement: tutorials/two_body_refine.md
      - Three-Body Problem: tutorials/three_body.md
  - ODE Integrator:
      - Overview: ode/index.md
      - Mathematical Foundations: ode/math.md
      - API Reference: ode/api.md
      - Methods & Benchmarks: ode/methods.md
      - Events: ode/events.md
      - Examples: ode/examples.md
  - Automatic Domain Splitting:
      - Overview: ads/index.md
      - API Reference: ads/api.md
      - Refinement: ads/refine.md
